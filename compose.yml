services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      protected-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  protected-api:
    build:
      context: .
      dockerfile: protected-api/Dockerfile
      additional_contexts:
        authsdk: ../authSDK
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8200
      AUTH_SERVICE_URL: http://host.docker.internal:8000
      EXPECTED_AUDIENCE: sample-protected-api
      ACCESS_COOKIE_NAME: auth_access
      CSRF_COOKIE_NAME: auth_csrf
      CSRF_HEADER_NAME: X-CSRF-Token
      AUTHSDK_REPO_PATH: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
