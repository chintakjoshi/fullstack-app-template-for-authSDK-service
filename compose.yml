services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-scram-sha-256}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_HTTP_PORT:-8025}:8025"

  auth-service:
    image: ${AUTH_SERVICE_IMAGE:-ghcr.io/chintakjoshi/auth-service:v1.4.3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      APP__ENVIRONMENT: ${APP__ENVIRONMENT:-development}
      APP__SERVICE: ${APP__SERVICE:-auth-service}
      APP__HOST: 0.0.0.0
      APP__PORT: "${APP__PORT:-8000}"
      APP__LOG_LEVEL: ${APP__LOG_LEVEL:-INFO}
      APP__EXPOSE_DOCS: "${APP__EXPOSE_DOCS:-true}"
      DATABASE__URL: ${DATABASE__URL:-postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/auth_service}
      REDIS__URL: ${REDIS__URL:-redis://redis:6379/0}
      JWT__ALGORITHM: ${JWT__ALGORITHM:-RS256}
      JWT__ACCESS_TOKEN_TTL_SECONDS: "${JWT__ACCESS_TOKEN_TTL_SECONDS:-900}"
      JWT__REFRESH_TOKEN_TTL_SECONDS: "${JWT__REFRESH_TOKEN_TTL_SECONDS:-604800}"
      RATE_LIMIT__DEFAULT_REQUESTS_PER_MINUTE: "${RATE_LIMIT__DEFAULT_REQUESTS_PER_MINUTE:-120}"
      RATE_LIMIT__LOGIN_REQUESTS_PER_MINUTE: "${RATE_LIMIT__LOGIN_REQUESTS_PER_MINUTE:-10}"
      RATE_LIMIT__TOKEN_REQUESTS_PER_MINUTE: "${RATE_LIMIT__TOKEN_REQUESTS_PER_MINUTE:-30}"
      AUTH__REQUIRE_VERIFIED_EMAIL_FOR_PASSWORD_LOGIN: "${AUTH__REQUIRE_VERIFIED_EMAIL_FOR_PASSWORD_LOGIN:-true}"
      BROWSER_SESSIONS__ENABLED: "${BROWSER_SESSIONS__ENABLED:-true}"
      BROWSER_SESSIONS__INFER_COOKIE_TRANSPORT: "${BROWSER_SESSIONS__INFER_COOKIE_TRANSPORT:-true}"
      BROWSER_SESSIONS__TRANSPORT_HEADER_NAME: ${BROWSER_SESSIONS__TRANSPORT_HEADER_NAME:-X-Auth-Session-Transport}
      BROWSER_SESSIONS__ACCESS_COOKIE_NAME: ${BROWSER_SESSIONS__ACCESS_COOKIE_NAME:-auth_access}
      BROWSER_SESSIONS__REFRESH_COOKIE_NAME: ${BROWSER_SESSIONS__REFRESH_COOKIE_NAME:-auth_refresh}
      BROWSER_SESSIONS__CSRF_COOKIE_NAME: ${BROWSER_SESSIONS__CSRF_COOKIE_NAME:-auth_csrf}
      BROWSER_SESSIONS__SAME_SITE: ${BROWSER_SESSIONS__SAME_SITE:-lax}
      BROWSER_SESSIONS__SECURE_ONLY: "${BROWSER_SESSIONS__SECURE_ONLY:-false}"
      BROWSER_SESSIONS__ACCESS_COOKIE_PATH: ${BROWSER_SESSIONS__ACCESS_COOKIE_PATH:-/}
      BROWSER_SESSIONS__REFRESH_COOKIE_PATH: ${BROWSER_SESSIONS__REFRESH_COOKIE_PATH:-/_auth}
      BROWSER_SESSIONS__CSRF_COOKIE_PATH: ${BROWSER_SESSIONS__CSRF_COOKIE_PATH:-/}
      BROWSER_SESSIONS__CSRF_HEADER_NAME: ${BROWSER_SESSIONS__CSRF_HEADER_NAME:-X-CSRF-Token}
      EMAIL__MAILHOG_HOST: mailhog
      EMAIL__MAILHOG_PORT: "1025"
      EMAIL__EMAIL_FROM: ${EMAIL__EMAIL_FROM:-auth@localhost}
      EMAIL__PUBLIC_BASE_URL: ${EMAIL__PUBLIC_BASE_URL:-http://localhost:8000}
      EMAIL__EMAIL_VERIFY_TTL_SECONDS: "${EMAIL__EMAIL_VERIFY_TTL_SECONDS:-86400}"
      EMAIL__PASSWORD_RESET_TTL_SECONDS: "${EMAIL__PASSWORD_RESET_TTL_SECONDS:-3600}"
      EMAIL__OTP_CODE_LENGTH: "${EMAIL__OTP_CODE_LENGTH:-6}"
      EMAIL__OTP_TTL_SECONDS: "${EMAIL__OTP_TTL_SECONDS:-600}"
      EMAIL__OTP_MAX_ATTEMPTS: "${EMAIL__OTP_MAX_ATTEMPTS:-5}"
      EMAIL__ACTION_TOKEN_TTL_SECONDS: "${EMAIL__ACTION_TOKEN_TTL_SECONDS:-300}"
      OAUTH__GOOGLE_CLIENT_ID: ${OAUTH__GOOGLE_CLIENT_ID:-local-google-client-id}
      OAUTH__GOOGLE_CLIENT_SECRET: ${OAUTH__GOOGLE_CLIENT_SECRET:-local-google-client-secret}
      OAUTH__GOOGLE_REDIRECT_URI: ${OAUTH__GOOGLE_REDIRECT_URI:-http://localhost:8000/auth/oauth/google/callback}
      OAUTH__REDIRECT_URI_ALLOWLIST: '${OAUTH__REDIRECT_URI_ALLOWLIST:-["http://localhost:8000/auth/oauth/google/callback"]}'
      SAML__SP_ENTITY_ID: ${SAML__SP_ENTITY_ID:-local-sp-entity}
      SAML__SP_ACS_URL: ${SAML__SP_ACS_URL:-http://localhost:8000/auth/saml/callback}
      SAML__SP_X509_CERT: ${SAML__SP_X509_CERT:-local-sp-cert}
      SAML__SP_PRIVATE_KEY: ${SAML__SP_PRIVATE_KEY:-local-sp-private-key}
      SAML__IDP_ENTITY_ID: ${SAML__IDP_ENTITY_ID:-local-idp-entity}
      SAML__IDP_SSO_URL: ${SAML__IDP_SSO_URL:-https://idp.example.com/sso}
      SAML__IDP_X509_CERT: ${SAML__IDP_X509_CERT:-local-idp-cert}
      SIGNING_KEYS__ROTATION_OVERLAP_SECONDS: "${SIGNING_KEYS__ROTATION_OVERLAP_SECONDS:-900}"
      SIGNING_KEYS__ENCRYPTION_KEY: ${SIGNING_KEYS__ENCRYPTION_KEY:-local-dev-signing-keys-encryption-key}
      WEBHOOK__QUEUE_NAME: ${WEBHOOK__QUEUE_NAME:-webhooks}
      WEBHOOK__REQUEST_TIMEOUT_SECONDS: "${WEBHOOK__REQUEST_TIMEOUT_SECONDS:-10}"
      WEBHOOK__RESPONSE_BODY_MAX_CHARS: "${WEBHOOK__RESPONSE_BODY_MAX_CHARS:-1000}"
      WEBHOOK__WORKER_TTL_SECONDS: "${WEBHOOK__WORKER_TTL_SECONDS:-120}"
      WEBHOOK__REDIS_HEALTH_CHECK_INTERVAL_SECONDS: "${WEBHOOK__REDIS_HEALTH_CHECK_INTERVAL_SECONDS:-30}"
      WEBHOOK__SECRET_ENCRYPTION_KEY: ${WEBHOOK__SECRET_ENCRYPTION_KEY:-local-dev-webhook-secret-encryption-key}
    command: >
      /bin/sh -c '
      if [ -z "$$JWT__PRIVATE_KEY_PEM" ] || [ -z "$$JWT__PUBLIC_KEY_PEM" ]; then
        openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out /tmp/private.pem &&
        openssl rsa -pubout -in /tmp/private.pem -out /tmp/public.pem &&
        export JWT__PRIVATE_KEY_PEM="$$(cat /tmp/private.pem)" &&
        export JWT__PUBLIC_KEY_PEM="$$(cat /tmp/public.pem)";
      fi;
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port $${APP__PORT:-8000}
      '
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:$${APP__PORT:-8000}/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "${APP__PORT:-8000}:${APP__PORT:-8000}"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      auth-service:
        condition: service_healthy
      protected-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  protected-api:
    build:
      context: .
      dockerfile: protected-api/Dockerfile
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8200
      AUTH_SERVICE_URL: http://auth-service:8000
      EXPECTED_AUDIENCE: sample-protected-api
      ACCESS_COOKIE_NAME: auth_access
      CSRF_COOKIE_NAME: auth_csrf
      CSRF_HEADER_NAME: X-CSRF-Token
    depends_on:
      auth-service:
        condition: service_healthy
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8200/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
